version: 2

sources:
  - name: core
    schema: core
    description: "Core schema populated by the update_db Airflow DAG"
    tables:
      - name: yt_api
        description: "Typed and deduplicated YouTube video metadata"
        columns:
          - name: '"Video_ID"'
            tests:
              - unique
              - not_null
          - name: '"Video_Title"'
            tests:
              - not_null
          - name: '"Upload_Date"'
            tests:
              - not_null
          - name: '"Video_Views"'
          - name: '"Likes_Count"'
          - name: '"Comments_Count"'